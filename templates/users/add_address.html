{% extends "base.html" %}
{% block title %}Add Address{% endblock %}
{% block content %}
<section class="section page-section">
    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header"><h1>Add Address</h1></div>
                <form method="POST" class="auth-form">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="form-group">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<span class="field-error">{{ field.errors.0 }}</span>{% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary btn-lg btn-block">Save Address</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
